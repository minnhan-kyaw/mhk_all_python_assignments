{% extends "base.html" %}

{% block title%}Edit{% endblock %}

{% block body%}
<form method="POST" action="/product/edit/{{ index }}" >
    <p>Name</p>
    <input name="name" type="text" value="{{ current['name'] }}">
    <p>Price</p>
    <input name="price" type="number" value="{{ current['price'] }}"><br><br>
    <input type="submit" value="Save changes"><br><br>   
</form>
{% endblock %}
