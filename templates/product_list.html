{% extends "base.html" %}

{% block title%}Listing{% endblock %}

{% block body%}
<a href="/product">Create One</a>
    <br>
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
            <th>Product Name</th>
            <th>Price</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
            {% if not product_list %}
            <tr>
                <td colspan="3" >No Record.</td>
            </tr>
            {% endif %}

            {% for product in product_list %}
            <tr>
                <td>{{ product.name }}</td>
                <td>{{ product.price }}</td>
                <td>
                    <a href="/product/edit/{{loop.index0}}">Edit</a>
                    <form method="post" action="/product/{{ loop.index0 }}" style="display: inline;">
                        <button type="submit" onclick="return confirm('Are you sure want to delete this product?')">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

 {% endblock %}
