{% extends "base.html" %}

{% block title %}Edit Product{% endblock %}

{% block body %}
<div class="form">
    <div class="form-card">
        <h2>Edit Product</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="custom-alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('edit_product', index=index) }}">
            <div class="input-group">
                <label>Product Name</label>
                <input name="name" type="text" value="{{ current.name }}" required>
            </div>
            
            <div class="input-group">
                <label>Price (Ks)</label>
                <input name="price" type="number" value="{{ current.price }}" min="0" required>
            </div>

            <div class="button-group">
                <input type="submit" value="Save Changes" class="btn-save">
                <a href="{{ url_for('list_products') }}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
