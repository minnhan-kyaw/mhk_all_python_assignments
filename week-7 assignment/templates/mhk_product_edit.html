{% extends "base.html" %}

{% block title %}Edit{% endblock %}

{% block body%}
<form method="POST" action="{{ url_for('edit_product',index=index) }}" >
    <p>Name</p>
    <input name="name" type="text" value="{{ current['name'] }}">
    <p>Price</p>
    <input name="price" type="number" min="0" value="{{ current['price'] }}"><br><br>
    <input type="submit" value="Save changes"><br><br>   
</form>
{% endblock %}
