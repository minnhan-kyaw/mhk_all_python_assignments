<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management - Entry</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-bar">
        <div><h3>Product Management</h3></div>
        <ul class="nav-menu">
            <li><a href="index.html">Product Entry</a></li>
            <li><a href="listing.html">Product Listing</a><li>
        </ul>
    </nav>
        <div class="main-content">
           <div class="card">
            <h3>Product Entry</h3>
            <form class="entry-form">
                <div class="input-group">
                    <label for="name">Product Name</label>
                    <input type="text" name="name" class="text-box">
                </div>
                <div class="input-group">
                    <label for="price">Product Price</label>
                    <input type="text" name="price" class="text-box">
                </div>
                <div class="btn-group">
                    <button class="save-btn" >Save</button>
                    <a href="listing.html" class="cancel-btn" >Cancel</a>
                </div>
            </form>
           </div>
        </div>
    
</body>
</html>
